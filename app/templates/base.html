<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}TimeLens{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/app.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="site-header">
        <div class="brand">
          <a href="/">TimeLens</a>
          <p>从时间、地点与记忆重新发现你的照片</p>
        </div>
        <nav class="site-nav">
          <a href="/gallery">照片</a>
          <a href="/memories/on-this-day">那年今日</a>
          <a href="/timeline">时间轴</a>
          <a href="/map">人生地图</a>
          <a href="/people">人物</a>
          <a href="/recommendations">推荐</a>
        </nav>
      </header>
      <main class="page">{% block content %}{% endblock %}</main>
    </div>
  </body>
</html>
